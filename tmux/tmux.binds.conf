unbind C-b
set -g prefix C-space
bind-key 'C-space' send-prefix
# bind-key -T root C-a switch-client -T my-keys

# Pane management
unbind-key v
unbind-key s
bind-key v split-window -h
bind-key s split-window -v
unbind-key V
unbind-key S
unbind-key =
unbind-key a
unbind-key A
# Pane layouts
# V: main-vertical using 66% main pane width
bind-key V setw main-pane-width 66% \; select-layout main-vertical
# S: main-vertical-mirrored, main on right at 75%
bind-key S setw main-pane-width 70% \; select-layout main-vertical-mirrored
# z toggles zooms pane
# ! move pane to window
# x closes pane
bind-key x kill-pane
unbind-key M
bind-key M choose-window 'join-pane -h -t "%%"'
# Window management

unbind-key c
unbind-key b
unbind-key w
bind-key c kill-window
bind-key b last-window
bind-key w new-window
# n next window
# p previous window

# Session management

unbind-key C
unbind-key B
unbind-key N
unbind-key P
bind-key C kill-session
bind-key B switch-client -l
bind-key N switch-client -n
bind-key P switch-client -p
unbind-key f
bind-key f display-popup -E "tms"
unbind-key t
bind-key t display-popup 
unbind-key g
bind-key g display-popup -h 90% -w 90% -E "lazygit"  
# bind-key Space display-popup -E "tmux list-sessions | sed -E 's/:.*$//' | grep -v \"^$(tmux display-message -p '#S')\$\" | fzf --reverse | xargs tmux switch-client -t"

bind Space display-popup -E "tmux-session-switch"

# Switch to session by id: <prefix> e <0-9>
bind-key e switch-client -T session-select \; refresh-client -S
bind-key -T session-select 0 switch-client -t '$0'
bind-key -T session-select 1 switch-client -t '$1'
bind-key -T session-select 2 switch-client -t '$2'
bind-key -T session-select 3 switch-client -t '$3'
bind-key -T session-select 4 switch-client -t '$4'
bind-key -T session-select 5 switch-client -t '$5'
bind-key -T session-select 6 switch-client -t '$6'
bind-key -T session-select 7 switch-client -t '$7'
bind-key -T session-select 8 switch-client -t '$8'
bind-key -T session-select 9 switch-client -t '$9'

unbind-key L
# Jump to the pane running localhost:3000
bind-key L run-shell "tmux-goto-server"

# ruddr board popup
bind-key h display-popup -h 80% -w 80% "bash -c 'source ~/.config/ruddr-flow/env.sh; board; exec cat > /dev/null'"
