# Theme colors
thm_bg="#2D4F67"
thm_fg="#C8C093"
thm_cyan="#6a9589"
thm_black="#090618"
thm_gray="#727169"
thm_magenta="#957FB8"
thm_red="#C34043"
thm_green="#76946A"
thm_yellow="#c0a36e"
thm_blue="#7e9cd8"
thm_orange="#DCA561"
thm_black4="#585b70"
thm_none="default"

# Status bar
set -g status 2
set -g status-bg default
set -g status-style "bg=$thm_none"
set -g status-position top
set -g status-left-length 90
set -g status-right-length 90
set -g focus-events on

# Messages
set -gq message-style "fg=${thm_cyan},bg=${thm_black},align=centre"
set -gq message-command-style "fg=${thm_cyan},bg=${thm_black},align=centre"

# Window options (native status hidden; rendered via status-format[1])
set-window-option -g window-active-style bg=terminal
set-window-option -g window-style bg=default
set-window-option -gq window-status-activity-style "fg=${thm_fg},bg=${thm_black},none"
set-window-option -gq window-status-separator ""
set-window-option -gq window-status-style "fg=${thm_red},bg=${thm_black},none"
set-window-option -gq window-status-format ""
set-window-option -gq window-status-current-format ""

# Top row: session list + prefix indicator
active_session="#{#[fg=$thm_fg,bg=$thm_none]◢#[fg=$thm_black,bg=$thm_fg,bold] #{s/\\$//g:session_id} #{session_name} #[fg=$thm_fg,bg=$thm_none,nobold]◣}"
inactive_session="#{#[fg=$thm_black4,bg=$thm_none]◢#[fg=$thm_fg,bg=$thm_black4] #{s/\\$//g:session_id} #{session_name} #[fg=$thm_black4,bg=$thm_none]◣}"
show_session_list="#{#{S:#{?session_attached,${active_session},${inactive_session}}}}"
window_prefix="#{?client_prefix,#{#[fg=$thm_fg,bg=$thm_none] ⦿ #{}},""}"

set -gq status-left "${show_session_list}${window_prefix}"
set -gq status-right ""

# Bottom row: window list + session path
active_window="#{#[fg=$thm_fg,bg=$thm_none,bold] ● #I #{window_name} #[nobold]}"
inactive_window="#{#[fg=$thm_gray,bg=$thm_none] · #I #{window_name} }"
show_window_list="#{#{W:#{?window_active,${active_window},${inactive_window}}}}"
session_path_display="#[fg=$thm_gray,bg=$thm_none]#{s|$HOME|~|:session_path} "

set -g status-format[1] "#[align=left]${show_window_list}#[align=right]${session_path_display}"

# Panes
set -g pane-border-format "#{?pane_active,#{#[fg=$thm_fg,bg=$thm_none]#[fg=$thm_black,bg=$thm_fg]#{pane_index}#[fg=$thm_fg,bg=$thm_none]},#{#[fg=$thm_black4,bg=$thm_none]#[fg=$thm_black,bg=$thm_black4]#{pane_index}#[fg=$thm_black4,bg=$thm_none]}}"
set -g pane-border-style "fg=$thm_black4,bg=$thm_none"
set -g pane-active-border-style "fg=$thm_fg,bg=$thm_none"
setw -g pane-border-lines "heavy"
set-hook -g window-layout-changed 'set-window -F pane-border-status "#{?#{==:#{window_panes},1},off,#{?window_zoomed_flag,off,top}}"'
